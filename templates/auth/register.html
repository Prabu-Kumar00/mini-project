{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="mb-4 text-center fw-bold"><i class="bi bi-person-plus"></i> Register</h4>
        <form method="POST" action="/register">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" id="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">College Email</label>
              <input type="email" name="email" id="email" class="form-control" placeholder="name@srec.ac.in" required>
            </div>
            <div class="col-12">
              <label class="form-label">Roll Number</label>
              <input type="text" name="roll_no" id="roll_no" class="form-control" placeholder="e.g. 71812401049"
                maxlength="11" required>
              <div class="form-text text-muted">Department and year will fill automatically.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <select name="department" id="department" class="form-select" required>
                <option value="">Select</option>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
                <option value="MECH">MECH</option>
                <option value="IT">IT</option>
                <option value="EIE">EIE</option>
                <option value="BME">BME</option>
                <option value="AERO">AERO</option>
                <option value="CIVIL">CIVIL</option>
                <option value="R&A">R&A</option>
                <option value="AI&DS">AI&DS</option>
                <option value="M.Tech CSE">M.Tech CSE</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Year</label>
              <input type="text" name="class_name" id="class_name" class="form-control" placeholder="Auto-filled"
                readonly>
            </div>
            <div class="col-md-2">
              <label class="form-label">Section</label>
              <input type="text" name="section" id="section" class="form-control" placeholder="e.g. A" required>
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100">Register</button>
            </div>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">Already registered? <a href="/login">Login here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
