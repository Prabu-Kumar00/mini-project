{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card p-4" style="width:100%; max-width:440px;">

    <div class="text-center mb-4">
      <div style="width:60px;height:60px;border-radius:50%;
                  background:linear-gradient(135deg,#1a4fa0,#1976d2);
                  display:flex;align-items:center;justify-content:center;
                  margin:0 auto 1rem;">
        <i class="bi bi-shield-lock text-white fs-4"></i>
      </div>
      <h5 class="fw-bold">Set New Password</h5>
      <p class="text-muted small">Choose a strong password for your account.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">New Password</label>
        <input type="password" name="new_password" class="form-control"
               placeholder="Min. 6 characters" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">
        <i class="bi bi-check-circle me-1"></i> Reset Password
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i> Back to Login
      </a>
    </div>

  </div>
</div>

{% endblock %}
