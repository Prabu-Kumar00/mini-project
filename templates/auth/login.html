{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="mb-4 text-center fw-bold"><i class="bi bi-person-lock"></i> Student Login</h4>
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">College Email</label>
            <input type="email" name="email" class="form-control" placeholder="name@srcc.ac.in" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <hr>
        <p class="text-center mb-0">New user? <a href="/register">Register here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
