{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1"><i class="bi bi-pencil-square"></i> Submit Grievance</h4>
        <p class="text-muted small mb-4">Welcome, {{ student.name }} | {{ student.department }} | {{ student.roll_no }}</p>

        <!-- Toggle Buttons -->
        <div class="btn-group w-100 mb-4" role="group">
          <button type="button" class="btn btn-primary active" id="btn-text" onclick="toggleInput('text')">
            <i class="bi bi-chat-text"></i> Text Complaint
          </button>
          <button type="button" class="btn btn-outline-primary" id="btn-image" onclick="toggleInput('image')">
            <i class="bi bi-image"></i> Image Complaint
          </button>
        </div>

        <form method="POST" action="/dashboard" enctype="multipart/form-data">
          <input type="hidden" name="input_type" id="input_type" value="text">

          <!-- Text Input -->
          <div id="text-section">
            <label class="form-label fw-semibold">Describe your grievance</label>
            <textarea name="grievance_text" class="form-control" rows="5"
              placeholder="e.g. The computers in the CSE lab are not working..."></textarea>
          </div>

          <!-- Image Input -->
          <div id="image-section" style="display:none;">
            <label class="form-label fw-semibold">Upload image as evidence</label>
            <input type="file" name="grievance_image" class="form-control" accept="image/*">
            <div class="form-text">Supports: JPG, PNG. Max 5MB.</div>
          </div>

          <button type="submit" class="btn btn-success w-100 mt-4">
            <i class="bi bi-send"></i> Submit Grievance
          </button>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="/status" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-clock-history"></i> View My Grievances
      </a>
    </div>
  </div>
</div>
{% endblock %}
