{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-pencil-square"></i> Create New Post
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control"
                   placeholder="Enter a clear title..." required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select">
              <option value="General">General</option>
              <option value="Academic">Academic</option>
              <option value="Hostel">Hostel</option>
              <option value="Transport">Transport</option>
              <option value="Facilities">Facilities</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Content</label>
            <textarea name="content" class="form-control" rows="5"
                      placeholder="Describe your issue or question..." required></textarea>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="is_anonymous" id="anonCheck">
            <label class="form-check-label" for="anonCheck">
              Post anonymously
            </label>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send"></i> Submit Post
            </button>
            <a href="{{ url_for('community.index') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
